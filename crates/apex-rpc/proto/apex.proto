syntax = "proto3";
package apex.rpc;

message BranchId {
  uint64 file_id = 1;
  uint32 line = 2;
  uint32 col = 3;
  uint32 direction = 4;
}

message InputSeed {
  string id = 1;
  bytes data = 2;
  string origin = 3;
}

message ExecutionResult {
  string seed_id = 1;
  string status = 2;
  repeated BranchId new_branches = 3;
  uint64 duration_ms = 4;
  string stdout = 5;
  string stderr = 6;
}

message CoverageSnapshot {
  uint64 total_branches = 1;
  uint64 covered_branches = 2;
  double coverage_percent = 3;
  repeated BranchId uncovered = 4;
}

message WorkerInfo {
  string worker_id = 1;
  string language = 2;
  uint32 capacity = 3;
}

message RegisterResponse {
  bool accepted = 1;
  string session_id = 2;
}

message Heartbeat {
  string worker_id = 1;
  uint32 active_seeds = 2;
}

message HeartbeatAck {
  bool ok = 1;
}

message SeedRequest {
  string worker_id = 1;
  uint32 max_seeds = 2;
}

message SeedBatch {
  repeated InputSeed seeds = 1;
}

message ResultBatch {
  string worker_id = 1;
  repeated ExecutionResult results = 2;
}

message ResultAck {
  uint64 new_coverage_count = 1;
  double coverage_percent = 2;
}

message Empty {}

service ApexCoordinator {
  rpc Register(WorkerInfo) returns (RegisterResponse);
  rpc SendHeartbeat(Heartbeat) returns (HeartbeatAck);
  rpc GetSeeds(SeedRequest) returns (SeedBatch);
  rpc SubmitResults(ResultBatch) returns (ResultAck);
  rpc GetCoverage(Empty) returns (CoverageSnapshot);
}
