<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680">
  <style>
    @keyframes blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
    @keyframes t1  { 0%,2%  { opacity: 0 } 3%  { opacity: 1 } }
    @keyframes t2  { 0%,7%  { opacity: 0 } 8%  { opacity: 1 } }
    @keyframes t3  { 0%,12% { opacity: 0 } 13% { opacity: 1 } }
    @keyframes t4  { 0%,16% { opacity: 0 } 17% { opacity: 1 } }
    @keyframes t5  { 0%,22% { opacity: 0 } 23% { opacity: 1 } }
    @keyframes t6  { 0%,27% { opacity: 0 } 28% { opacity: 1 } }
    @keyframes t7  { 0%,32% { opacity: 0 } 33% { opacity: 1 } }
    @keyframes t8  { 0%,37% { opacity: 0 } 38% { opacity: 1 } }
    @keyframes t9  { 0%,42% { opacity: 0 } 43% { opacity: 1 } }
    @keyframes t10 { 0%,47% { opacity: 0 } 48% { opacity: 1 } }
    @keyframes t11 { 0%,52% { opacity: 0 } 53% { opacity: 1 } }
    @keyframes t12 { 0%,56% { opacity: 0 } 57% { opacity: 1 } }
    @keyframes t13 { 0%,60% { opacity: 0 } 61% { opacity: 1 } }
    @keyframes t14 { 0%,64% { opacity: 0 } 65% { opacity: 1 } }
    .t { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Menlo, monospace; font-size: 13px; }
    .prompt { fill: #7ec699 } .cmd { fill: #e0e0e0 } .dim { fill: #6c7086 }
    .cyan { fill: #89dceb } .yellow { fill: #f9e2af } .red { fill: #f38ba8 }
    .green { fill: #a6e3a1 } .blue { fill: #89b4fa } .magenta { fill: #cba6f7 }
    .peach { fill: #fab387 } .white { fill: #cdd6f4 } .b { font-weight: 700 }
    .s1  { opacity: 0; animation: t1  30s infinite }
    .s2  { opacity: 0; animation: t2  30s infinite }
    .s3  { opacity: 0; animation: t3  30s infinite }
    .s4  { opacity: 0; animation: t4  30s infinite }
    .s5  { opacity: 0; animation: t5  30s infinite }
    .s6  { opacity: 0; animation: t6  30s infinite }
    .s7  { opacity: 0; animation: t7  30s infinite }
    .s8  { opacity: 0; animation: t8  30s infinite }
    .s9  { opacity: 0; animation: t9  30s infinite }
    .s10 { opacity: 0; animation: t10 30s infinite }
    .s11 { opacity: 0; animation: t11 30s infinite }
    .s12 { opacity: 0; animation: t12 30s infinite }
    .s13 { opacity: 0; animation: t13 30s infinite }
    .s14 { opacity: 0; animation: t14 30s infinite }
    .cursor { animation: blink 1s step-end infinite }
  </style>

  <!-- Terminal chrome -->
  <rect width="860" height="680" rx="10" fill="#1e1e2e"/>
  <rect width="860" height="36" rx="10" fill="#313244"/>
  <rect y="26" width="860" height="10" fill="#313244"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="430" y="22" text-anchor="middle" class="t dim" font-size="12">apex audit — real-world validation</text>

  <g class="t" transform="translate(18, 62)">
    <!-- Command -->
    <text y="0" class="prompt">$</text>
    <text x="16" y="0" class="cmd">apex audit --target ./top-10-repos --lang all</text>

    <!-- Phase 1: Scan header -->
    <g class="s1">
      <text y="30" class="cyan b">  APEX v0.2.1</text>
      <text x="120" y="30" class="dim"> — Scanning 10 repos, 11 languages...</text>
    </g>

    <!-- Phase 2: Real findings streaming in -->
    <g class="s2">
      <text y="60" class="yellow">  ⚠ HIGH</text>
      <text x="80" y="60" class="dim">kernel/printk/printk.c:312</text>
      <text x="330" y="60" class="white">CWE-134</text>
      <text x="410" y="60" class="dim">Format string vulnerability</text>
      <text y="78" class="yellow">  ⚠ HIGH</text>
      <text x="80" y="78" class="dim">Objects/fileobject.c:269</text>
      <text x="330" y="78" class="white">CWE-242</text>
      <text x="410" y="78" class="green">gets() banned function</text>
      <text x="590" y="78" class="green b">TP</text>
    </g>

    <g class="s3">
      <text y="96" class="red">  ⚠ CRIT</text>
      <text x="80" y="96" class="dim">pkg/controlplane/testserver.go:60</text>
      <text x="330" y="96" class="white">CWE-798</text>
      <text x="410" y="96" class="green">Hardcoded EC private key</text>
      <text x="608" y="96" class="green b">TP</text>
    </g>

    <g class="s4">
      <text y="114" class="yellow">  ⚠ HIGH</text>
      <text x="80" y="114" class="dim">src/compiler/emitter.ts:1847</text>
      <text x="330" y="114" class="white">CWE-94</text>
      <text x="410" y="114" class="dim">new Function() code injection</text>
      <text y="132" class="yellow">  ⚠ HIGH</text>
      <text x="80" y="132" class="dim">Sources/Development/configure.swift:49</text>
      <text x="330" y="132" class="white">CWE-798</text>
      <text x="410" y="132" class="green">PEM private key in source</text>
      <text x="608" y="132" class="green b">TP</text>
      <text y="154" class="dim">  ...12,770 findings across 10 repos (0 crashes)</text>
    </g>

    <!-- Phase 3: The problem -->
    <g class="s5">
      <text y="180" class="dim">  ──────────────────────────────────────────────────────</text>
    </g>

    <g class="s6">
      <text y="206" class="red b">  Problem: 77% are false positives</text>
      <text x="330" y="206" class="dim">(9,923 of 12,770 findings)</text>
    </g>

    <!-- Phase 4: Bug explanations with real code -->
    <g class="s7">
      <text y="236" class="peach b">  Bug #1</text>
      <text x="80" y="236" class="white">printk("hello %d", x)</text>
      <text x="280" y="236" class="dim">→ literal format string, not a vulnerability</text>
      <text y="254" class="dim">         1,584 false positives in Linux kernel alone — </text>
      <text x="455" y="254" class="green">fixed: skip literal fmt args</text>
    </g>

    <g class="s8">
      <text y="280" class="peach b">  Bug #2</text>
      <text x="80" y="280" class="white">cpumask_pr_args</text>
      <text x="210" y="280" class="dim">(entropy 4.6 bits) → C identifier, not a secret</text>
      <text y="298" class="dim">         838 false positives across all repos — </text>
      <text x="391" y="298" class="green">fixed: threshold 4.5 → 5.0</text>
    </g>

    <g class="s9">
      <text y="324" class="peach b">  Bug #4</text>
      <text x="80" y="324" class="white">new Function()</text>
      <text x="195" y="324" class="dim">in TypeScript compiler — legitimate codegen</text>
      <text y="342" class="dim">         760 false positives eliminated — </text>
      <text x="350" y="342" class="green">fixed: compiler/emitter path skip</text>
    </g>

    <!-- Phase 5: After fix (THE MONEY SHOT — visible for ~47% of cycle) -->
    <g class="s10">
      <text y="372" class="dim">  ──────────────────────────────────────────────────────</text>
    </g>

    <g class="s11">
      <text y="400" class="magenta b">  After 19 bug fixes</text>
      <text x="195" y="400" class="dim">(+42 tests, 1,207 total)</text>
    </g>

    <g class="s12">
      <text y="430" class="white">  FP rate:</text>
      <text x="120" y="430" class="red b">77%</text>
      <text x="160" y="430" class="white">→</text>
      <text x="180" y="430" class="green b" font-size="16">~30%</text>
      <text y="454" class="white">  Eliminated:</text>
      <text x="130" y="454" class="green b" font-size="16">~7,200</text>
      <text x="205" y="454" class="dim">false positives removed</text>
    </g>

    <g class="s13">
      <text y="478" class="white">  Tests:</text>
      <text x="120" y="478" class="blue b">1,207 passing</text>
      <text x="240" y="478" class="dim">(apex-detect)</text>
      <text y="496" class="white">  Crashes:</text>
      <text x="120" y="496" class="green b">0</text>
      <text x="140" y="496" class="dim">across all 10 repos</text>
      <text y="518" class="dim">  Repos: Linux · CPython · TypeScript · ripgrep · Spring Boot</text>
      <text y="536" class="dim">         Kubernetes · .NET · Vapor · Rails · ktor</text>
    </g>

    <!-- Cursor prompt — visible for ~35% of cycle = ~10.5 seconds -->
    <g class="s14">
      <text y="566" class="prompt">$</text>
      <rect x="16" y="555" width="8" height="15" fill="#cdd6f4" class="cursor"/>
    </g>
  </g>
</svg>
