[oap]
spec_version = "0.1.0"

[agent]
name = "apex-mcp"
version = "0.1.0"
description = "APEX MCP server — exposes coverage analysis, security detection, and reachability as MCP tools for any AI coding assistant"
license = "MIT"
authors = ["allexdav2"]
namespace = "@apex"
keywords = ["mcp", "coverage", "security", "code-analysis", "multi-language"]

[capabilities]
required = [
    "cap:shell/exec:apex*",
    "cap:mcp/serve",
]

[effects]
declares = [
    "effect:shell/exec",
    "effect:mcp/tools",
]

[hints]
model_tier = "any"
autonomy = "tool-only"
max_turns = 1

[mcp]
transport = "stdio"
command = "apex"
args = ["mcp"]
tools = [
    { name = "apex_run", description = "Coverage gap analysis" },
    { name = "apex_detect", description = "Security findings with CWE IDs" },
    { name = "apex_reach", description = "Reverse path to entry points" },
    { name = "apex_ratchet", description = "CI coverage gate" },
    { name = "apex_doctor", description = "Prerequisites check" },
    { name = "apex_deploy_score", description = "Deployment confidence 0-100" },
]

[distribution]
install = { cargo = "apex-coverage", npm = "@apex-coverage/cli", pip = "apex-coverage", brew = "allexdav2/tap/apex" }
