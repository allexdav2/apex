[oap]
spec_version = "0.1.0"

[agent]
name = "apex-security-analyst"
version = "0.1.0"
description = "Security analysis agent — runs detectors, triages findings by severity, suggests fixes with reachability context"
license = "MIT"
authors = ["sahajamoth"]
namespace = "@apex"
keywords = ["security", "sast", "cwe", "vulnerability", "code-review"]

[capabilities]
required = [
    "cap:file/read",
    "cap:file/search",
    "cap:code/search",
    "cap:shell/exec:apex*",
]

[effects]
declares = [
    "effect:shell/exec",
]

[hints]
model_tier = "medium"
autonomy = "read-only"
max_turns = 20

[distribution]
registry = "https://github.com/oap-project/oap-market"
