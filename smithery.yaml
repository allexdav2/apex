# Smithery.ai MCP Server Listing
# https://smithery.ai/docs/publishing

name: apex
display_name: "APEX — Code Coverage & Security Analysis"
description: |
  Autonomous coverage analysis, security detection, and reverse path reachability
  for 11 languages. 33 MCP tools: coverage gap analysis, CWE-mapped security
  findings, blast radius, taint tracing, deployment confidence scores, and more.
version: "0.5.0"
author: "sahajamoth"
repository: "https://github.com/sahajamoth/apex"
license: "MIT"

transport: stdio
command: apex
args: ["mcp"]

tools:
  - name: apex_run
    description: "Run coverage analysis — returns uncovered branches and gap report"
  - name: apex_detect
    description: "Security analysis — returns findings with CWE IDs and SARIF format"
  - name: apex_reach
    description: "Reverse path — find entry points reaching a code location"
  - name: apex_ratchet
    description: "CI coverage gate — PASS/FAIL with coverage percentage"
  - name: apex_doctor
    description: "Check prerequisites for a language"
  - name: apex_deploy_score
    description: "Deployment confidence score (0-100)"
  - name: apex_complexity
    description: "Cyclomatic complexity analysis with hotspot ranking"
  - name: apex_dead_code
    description: "Find unreachable branches and dead code"
  - name: apex_risk
    description: "Risk assessment for changed files"
  - name: apex_hotpaths
    description: "Most frequently executed code paths"
  - name: apex_test_optimize
    description: "Identify redundant tests to save CI time"
  - name: apex_test_prioritize
    description: "Prioritize tests by relevance to changed files"
  - name: apex_blast_radius
    description: "Blast radius of changed files — affected modules and tests"
  - name: apex_secret_scan
    description: "Scan for hardcoded secrets, API keys, and high-entropy strings"
  - name: apex_data_flow
    description: "Trace data flow and taint paths"
  - name: apex_diff
    description: "Coverage diff between two commits or branches"
  - name: apex_regression_check
    description: "Check for coverage regressions against baseline"
  - name: apex_lint
    description: "Code quality lints — complexity, naming, style"
  - name: apex_flaky_detect
    description: "Detect flaky tests from history and execution patterns"
  - name: apex_contracts
    description: "Extract function contracts (pre/post conditions)"
  - name: apex_attack_surface
    description: "Map attack surface — entry points, trust boundaries, APIs"
  - name: apex_verify_boundaries
    description: "Verify trust boundary enforcement between modules"
  - name: apex_features
    description: "List features and their test coverage status"
  - name: apex_index
    description: "Build branch coverage index"
  - name: apex_docs
    description: "Documentation coverage report"
  - name: apex_license_scan
    description: "Scan dependencies for license compliance"
  - name: apex_flag_hygiene
    description: "Detect stale or unused feature flags"
  - name: apex_api_diff
    description: "Compare two OpenAPI specs for breaking changes"
  - name: apex_compliance_export
    description: "Export compliance report (ASVS, STRIDE, SSDF)"
  - name: apex_api_coverage
    description: "Measure API endpoint test coverage against OpenAPI spec"
  - name: apex_service_map
    description: "Build service dependency map from imports and API calls"
  - name: apex_schema_check
    description: "Validate data schemas against actual usage"
  - name: apex_test_data
    description: "Generate test data based on schema analysis"

languages:
  - python
  - rust
  - javascript
  - typescript
  - java
  - kotlin
  - go
  - c
  - cpp
  - ruby
  - swift
  - csharp

categories:
  - code-analysis
  - security
  - testing
  - developer-tools

install:
  homebrew: "brew install sahajamoth/tap/apex"
  npm: "npm install -g @apex-coverage/cli"
  pip: "pip install apex-coverage"
  cargo: "cargo install --git https://github.com/sahajamoth/apex"
  curl: "curl -sSL https://raw.githubusercontent.com/sahajamoth/apex/main/install.sh | sh"
